name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_PREFIX: ip-check-for-waf-logs

jobs:
  build:
    name: Build extension ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.package.outputs.zip_name }}
      checksum: ${{ steps.checksum.outputs.checksum }}
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Derive and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          manifest_version="$(python3 - <<'PY'
          import json

          with open("manifest.json", encoding="utf-8") as manifest:
              print(json.load(manifest)["version"])
          PY
          )"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release tags must use the vX.Y.Z format."
              exit 1
            fi

            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${manifest_version}" != "${tag_version}" ]]; then
              echo "::error::manifest.json version (${manifest_version}) does not match tag ${GITHUB_REF_NAME}."
              exit 1
            fi

            default_branch="${{ github.event.repository.default_branch }}"
            git fetch --no-tags origin "${default_branch}:refs/remotes/origin/${default_branch}"
            if ! git merge-base --is-ancestor "$(git rev-parse HEAD)" "origin/${default_branch}"; then
              echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit on ${default_branch}."
              exit 1
            fi

            version="${tag_version}"
          else
            version="${manifest_version}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build deterministic extension ZIP
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          zip_name="${PACKAGE_PREFIX}-v${version}.zip"
          artifact_name="${PACKAGE_PREFIX}-v${version}"

          mkdir -p release
          ZIP_NAME="${zip_name}" python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          zip_path = Path("release") / os.environ["ZIP_NAME"]
          runtime_paths = [
              Path("manifest.json"),
              Path("background.js"),
              Path("content.js"),
              Path("styles.css"),
              Path("popup.html"),
              Path("popup.js"),
              Path("options.html"),
              Path("options.js"),
              Path("extension-ui.css"),
              Path("icons/icon16.png"),
              Path("icons/icon48.png"),
              Path("icons/icon128.png"),
          ]

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in runtime_paths:
                  if not path.is_file():
                      raise FileNotFoundError(path)

                  info = zipfile.ZipInfo(str(path), date_time=(1980, 1, 1, 0, 0, 0))
                  info.compress_type = zipfile.ZIP_DEFLATED
                  info.external_attr = 0o644 << 16
                  archive.writestr(info, path.read_bytes())
          PY

          echo "zip_name=${zip_name}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Create SHA-256 checksum
        id: checksum
        shell: bash
        run: |
          set -euo pipefail

          cd release
          shasum -a 256 "${{ steps.package.outputs.zip_name }}" > checksums.txt
          checksum="$(awk '{print $1}' checksums.txt)"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"
          cat checksums.txt

      - name: Upload release candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            release/${{ steps.package.outputs.zip_name }}
            release/checksums.txt
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release

      - name: Create release notes
        shell: bash
        run: |
          set -euo pipefail

          cat > release/integrity.md <<EOF
          ## Verify integrity

          \`\`\`bash
          shasum -a 256 ${{ needs.build.outputs.zip_name }}
          # Expected: ${{ needs.build.outputs.checksum }}
          \`\`\`

          The same SHA-256 value is also published in \`checksums.txt\`.
          EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${GITHUB_REF_NAME}" \
            "release/${{ needs.build.outputs.zip_name }}" \
            "release/checksums.txt" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

          gh release view "${GITHUB_REF_NAME}" --json body --jq '.body' > release/generated-notes.md
          {
            cat release/generated-notes.md
            printf '\n\n'
            cat release/integrity.md
          } > release/release-notes.md

          gh release edit "${GITHUB_REF_NAME}" --notes-file release/release-notes.md
