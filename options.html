<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Check for WAF Logs - Options</title>
    <link rel="stylesheet" href="extension-ui.css">
  </head>
  <body>
    <div class="options-wrap">
      <h1>IP Check for WAF Logs - Options</h1>
      <p class="muted">
        Enter your AbuseIPDB API key. Values are stored locally in your browser profile only.
      </p>

      <form id="settingsForm">
        <label>
          AbuseIPDB API key
          <input id="apiKey" type="text" autocomplete="off" spellcheck="false">
        </label>

        <label>
          maxAgeInDays
          <input id="maxAgeInDays" type="number" min="1" max="365" step="1">
        </label>

        <label>
          Cache TTL (hours)
          <input id="cacheTtlHours" type="number" min="1" max="720" step="1">
        </label>

        <label class="checkbox">
          <input id="useCache" type="checkbox">
          Use cached results for previously checked IPs
        </label>

        <label class="checkbox">
          <input id="darkMode" type="checkbox">
          Dark mode (tooltip, popup, and this page)
        </label>

        <button type="submit">Save</button>
        <div class="status" id="status"></div>
      </form>
    </div>

    <script src="options.js"></script>
  </body>
</html>
